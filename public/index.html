<!DOCTYPE html>
<html>
<head>
  <title>Deriv Panel</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="topbar">
  <h2>DERIV THIRD PARTY PANEL</h2>

  <select id="market">
    <option value="R_10">Vol 10</option>
    <option value="R_25">Vol 25</option>
    <option value="R_50">Vol 50</option>
    <option value="R_75">Vol 75</option>
    <option value="R_100">Vol 100</option>
  </select>

  <button onclick="startBot()">START</button>
  <button onclick="stopBot()">STOP</button>
</div>

<div id="main">

  <div id="chart"></div>

  <div id="side">

    <div class="box">
      Scanner panel
    </div>

    <div class="box">
      Bot panel
    </div>

    <div class="box">
      Market tracker
    </div>

  </div>

</div>

<script src="app.js"></script>
<script src="chart.js"></script>
<script src="bot.js"></script>

</body>
                         </html>
