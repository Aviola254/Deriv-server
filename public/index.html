<!DOCTYPE html>
<html>

<head>

<title>Deriv Third Party Panel</title>

<link rel="stylesheet" href="style.css">

</head>

<body>


<!-- TOP BAR -->

<div id="topbar">

<h2>DERIV THIRD PARTY PANEL</h2>

<select id="market">

<option value="R_10">Vol 10</option>
<option value="R_25">Vol 25</option>
<option value="R_50">Vol 50</option>
<option value="R_75">Vol 75</option>
<option value="R_100">Vol 100</option>

</select>

<button onclick="startBot()">START</button>
<button onclick="stopBot()">STOP</button>

</div>



<!-- MAIN -->

<div id="main">



<!-- CHART AREA -->

<div id="chart-area">

<canvas id="chart"></canvas>

</div>



<!-- SIDE PANEL -->

<div id="side">



<div class="box">

<h3>Scanner panel</h3>

<div id="scanner"></div>

</div>



<div class="box">

<h3>Bot panel</h3>

<div id="botpanel"></div>

</div>



<div class="box">

<h3>Market tracker</h3>

<div id="tracker"></div>

</div>



<div class="box">

<h3>Logs</h3>

<div id="logs"></div>

</div>



</div>



</div>



<!-- SCRIPTS -->

<script src="app.js"></script>
<script src="chart.js"></script>
<script src="bot.js"></script>



</body>

  </html>
