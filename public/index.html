<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Forge Token Panel</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>


<body>


<h1>FORGE TOKEN PANEL</h1>


<div id="topbar">

Token:

<input id="tokenInput">

<button onclick="connectWS()">CONNECT</button>


Market:

<select id="marketSelect">

<option value="R_10">Volatility 10</option>
<option value="R_25">Volatility 25</option>
<option value="R_50">Volatility 50</option>
<option value="R_75">Volatility 75</option>
<option value="R_100">Volatility 100</option>

</select>

<button onclick="changeMarket()">

SET

</button>

</div>



<div id="main">


<div id="left">

<h2>Chart</h2>

<canvas id="chart"></canvas>


<div>

Price:

<span id="price">

0

</span>

</div>


<div id="tradeButtons">

<button onclick="buy()">

BUY

</button>


<button onclick="sell()">

SELL

</button>

</div>


</div>



<div id="right">


<h2>Bot</h2>

<button onclick="startBot()">

START

</button>

<button onclick="stopBot()">

STOP

</button>



<h2>Scanner</h2>

<button onclick="scanMarket()">

SCAN

</button>

<div id="scanResult"></div>



<h2>Tracker</h2>

<button onclick="trackMarket()">

TRACK

</button>

<div id="trackResult"></div>



</div>


</div>



<script src="chart.js"></script>
<script src="token.js"></script>
<script src="app.js"></script>
<script src="trade.js"></script>
<script src="bot.js"></script>
<script src="scanner.js"></script>
<script src="tracker.js"></script>
<script src="markets.js"></script>
<script src="ui.js"></script>


</body>

  </html>
