<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Forge Dashboard</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>


<div class="topbar">

Token
<input id="tokenInput">
<button onclick="connectWS()">CONNECT</button>

Balance:
<span id="balance">0</span>

Account:
<span id="account">-</span>

<select id="marketSelect">

<option value="R_10">V10</option>
<option value="R_25">V25</option>
<option value="R_50">V50</option>
<option value="R_75">V75</option>
<option value="R_100">V100</option>

</select>

<button onclick="changeMarket()">SET</button>

</div>



<div class="main">


<!-- SIDEBAR -->

<div class="sidebar">

<div class="menu">TRADE</div>
<div class="menu">BOT</div>
<div class="menu">MARKETS</div>
<div class="menu">HISTORY</div>
<div class="menu">ACCOUNT</div>

</div>



<!-- CHART -->

<div class="chart-area">

<canvas id="chart"></canvas>

Price:
<span id="price">0</span>

<button onclick="buy()">BUY</button>
<button onclick="sell()">SELL</button>

</div>



<!-- RIGHT PANEL -->

<div class="side">

<div class="panel">

<h3>BOT</h3>
<button onclick="startBot()">START</button>
<button onclick="stopBot()">STOP</button>

</div>

<div class="panel">

<h3>SCANNER</h3>
<button onclick="scanMarket()">SCAN</button>
<div id="scanResult"></div>

</div>

<div class="panel">

<h3>TRACKER</h3>
<button onclick="trackMarket()">TRACK</button>
<div id="trackResult"></div>

</div>

<div class="panel">

<h3>CONTRACTS</h3>
<div id="contracts"></div>

</div>

<div class="panel">

<h3>HISTORY</h3>
<div id="history"></div>

</div>

</div>


</div>


<script src="chart.js"></script>
<script src="token.js"></script>
<script src="trade.js"></script>
<script src="bot.js"></script>
<script src="scanner.js"></script>
<script src="tracker.js"></script>
<script src="markets.js"></script>
<script src="ui.js"></script>
<script src="account.js"></script>
<script src="balance.js"></script>
<script src="contracts.js"></script>
<script src="history.js"></script>
<script src="dashboard.js"></script>
<script src="layout.js"></script>

</body>
</html>
